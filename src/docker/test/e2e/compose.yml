services:
  tests:
    image: seedsyncarr/test/e2e
    container_name: seedsyncarr_test_e2e
    build:
      context: ../../../../
      dockerfile: src/docker/test/e2e/Dockerfile
      target: seedsyncarr_test_e2e
    depends_on:
      configure:
        condition: service_completed_successfully
    # Playwright needs more shared memory for browser
    shm_size: 1024M
    environment:
      - CI=true

  remote:
    image: seedsyncarr/test/e2e/remote
    container_name: seedsyncarr_test_e2e_remote
    # NOTE: This service is pre-built by the Makefile (run-tests-e2e) which
    # passes --build-arg SSH_PUBKEY. Do not build via docker compose directly.
    # Platform must match myapp so scanfs binary can execute
    platform: ${SEEDSYNCARR_PLATFORM:-linux/amd64}
    build:
      context: ../../../../
      dockerfile: src/docker/test/e2e/remote/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1234'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  myapp:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8800/server/status"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - type: bind
        source: ${E2E_SSH_KEY:?E2E_SSH_KEY must be set — run via 'make run-tests-e2e'}
        target: /home/seedsync/.ssh/id_ed25519
        read_only: true

  configure:
    image: seedsyncarr/test/e2e/configure
    container_name: seedsyncarr_test_e2e_configure
    build:
      context: ../../../../
      dockerfile: src/docker/test/e2e/configure/Dockerfile
    depends_on:
      myapp:
        condition: service_healthy
      remote:
        condition: service_healthy
    # REMOTE_USERNAME must match user created in remote/Dockerfile
    environment:
      - REMOTE_USERNAME=${REMOTE_USERNAME:-remoteuser}
