<div class="form-group"
  [class.error]="value == '<replace me>'">

  <!-- Textbox -->
  @if (type == OptionType.Text) {
    <label>
      <span class="name">{{label}}</span>
      @if (description) {
        <span class="description">{{description}}</span>
      }
      <input
        type="text"
        class="form-control"
        [disabled]="value == null"
        [ngModel]="value"
        (ngModelChange)="onChange($event)" />
    </label>
  }

  <!-- Checkbox (Toggle Switch) -->
  @if (type == OptionType.Checkbox) {
    <div class="form-toggle" [class.form-toggle--compact]="compact">
      <div class="toggle-text">
        <span class="name">{{label}}</span>
        @if (description) {
          <span class="description">{{description}}</span>
        }
      </div>
      <label class="toggle-label">
        <input
          type="checkbox"
          class="toggle-input"
          [disabled]="value == null"
          [ngModel]="value"
          (ngModelChange)="onChange($event)" />
        <div class="toggle-track"></div>
      </label>
    </div>
  }

  <!-- Password -->
  @if (type == OptionType.Password) {
    <label>
      <span class="name">{{label}}</span>
      @if (description) {
        <span class="description">{{description}}</span>
      }
      <input
        type="password"
        class="form-control"
        [disabled]="value == null"
        [ngModel]="value"
        (ngModelChange)="onChange($event)" />
    </label>
  }
</div>
