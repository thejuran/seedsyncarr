@if (hasSelection) {
  <div class="bulk-actions-bar">
    <div class="bar-left">
      <span class="selection-label">{{ selectedCount }} selected</span>
      <button type="button" class="clear-btn"
              [disabled]="operationInProgress"
              (click)="onClearClick()">Clear</button>
    </div>
    <div class="actions">
      @if (operationInProgress) {
        <span class="progress-indicator">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Processing...
        </span>
      }
      <button type="button" class="action-btn action-queue"
              [disabled]="actionCounts.queueable === 0 || operationInProgress"
              (click)="onQueueClick()">
        <i class="fa fa-play"></i> Queue
      </button>
      <button type="button" class="action-btn action-danger"
              [disabled]="actionCounts.stoppable === 0 || operationInProgress"
              (click)="onStopClick()">
        <i class="fa fa-stop"></i> Stop
      </button>
      <button type="button" class="action-btn action-neutral"
              [disabled]="actionCounts.extractable === 0 || operationInProgress"
              (click)="onExtractClick()">
        <i class="fa fa-file-archive-o"></i> Extract
      </button>
      <div class="btn-divider" aria-hidden="true"></div>
      <button type="button" class="action-btn action-danger"
              [disabled]="actionCounts.locallyDeletable === 0 || operationInProgress"
              (click)="onDeleteLocalClick()">
        <i class="fa fa-trash"></i> Delete Local
      </button>
      <button type="button" class="action-btn action-danger"
              [disabled]="actionCounts.remotelyDeletable === 0 || operationInProgress"
              (click)="onDeleteRemoteClick()">
        <i class="fa fa-cloud"></i><i class="fa fa-ban action-overlay" aria-hidden="true"></i> Delete Remote
      </button>
    </div>
  </div>
}
