name: Bug Report
description: Report a bug to help us improve SeedSyncarr
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: dropdown
    id: install-type
    attributes:
      label: Installation type
      options:
        - Docker
        - pip
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SeedSyncarr version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Docker: docker logs seedsyncarr | Debian: journalctl -u seedsyncarr"
      render: shell
