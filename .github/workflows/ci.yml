
name: CI

on:
  push:
    branches: [ main ]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:

  unittests-release-metadata:
    name: Release metadata verifier tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Run release metadata verifier tests
        run: npm run test:release-metadata

  unittests-python:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into GitHub Container Registry
        run: echo "$DOCKER_TOKEN" | docker login https://ghcr.io -u "$DOCKER_USER" --password-stdin
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
      - name: Set staging registry env variable
        run: echo "staging_registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Run Python unit tests
        run: make run-tests-python PYTHON_TEST_CACHE_REGISTRY="$STAGING_REGISTRY"
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}

  unittests-angular:
    name: Angular unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Angular unit tests
        run: make run-tests-angular

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Python lint
        run: ruff check src/python/

  lint-angular:
    name: Lint (Angular)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/angular/package-lock.json

      - name: Install Angular dependencies
        run: cd src/angular && npm ci

      - name: Angular lint
        run: cd src/angular && npm run lint

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ unittests-release-metadata, unittests-python, unittests-angular, lint-python, lint-angular, verify-release-metadata ]
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Sets up build environment
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Show buildx builder instance name
        run: echo "${{ steps.buildx.outputs.name }}"
      - name: Show buildx available platforms
        run: echo "${{ steps.buildx.outputs.platforms }}"

      # Login to GHCR
      - name: Log into GitHub Container Registry
        run: echo "$DOCKER_TOKEN" | docker login https://ghcr.io -u "$DOCKER_USER" --password-stdin
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
      # Set staging registry
      - name: Set staging registry env variable
        run: echo "staging_registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Build docker image
      - name: Build docker image
        run: make docker-image STAGING_REGISTRY="$STAGING_REGISTRY" STAGING_VERSION="$STAGING_VERSION"
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}
          STAGING_VERSION: ${{ github.run_number }}

  e2etests-docker-image:
    name: End-to-end tests on Docker Image (${{ matrix.arch }})
    needs: [ build-docker-image ]
    strategy:
      fail-fast: false
      # arm64 E2E only runs on main push + release tags (where it gates
      # image publish). PRs run amd64 only — arm64 regressions are rare
      # for code changes that don't touch native deps, and arm64 E2E via
      # hosted runner adds ~10 min to PR feedback.
      matrix:
        include: ${{ fromJSON((github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) && '[{"arch":"amd64","runner":"ubuntu-latest"},{"arch":"arm64","runner":"ubuntu-24.04-arm"}]' || '[{"arch":"amd64","runner":"ubuntu-latest"}]') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Sets up build environment
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Show buildx builder instance name
        run: echo "${{ steps.buildx.outputs.name }}"
      - name: Show buildx available platforms
        run: echo "${{ steps.buildx.outputs.platforms }}"

      # Login to GHCR
      - name: Log into GitHub Container Registry
        run: echo "$DOCKER_TOKEN" | docker login https://ghcr.io -u "$DOCKER_USER" --password-stdin
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
      # Set staging registry
      - name: Set staging registry env variable
        run: echo "staging_registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Run e2e test
      - name: Run e2e test
        run: make run-tests-e2e \
          STAGING_REGISTRY="$STAGING_REGISTRY" \
          STAGING_VERSION="$STAGING_VERSION" \
          SEEDSYNCARR_ARCH="$SEEDSYNCARR_ARCH"
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}
          STAGING_VERSION: ${{ github.run_number }}
          SEEDSYNCARR_ARCH: ${{ matrix.arch }}

  verify-release-metadata:
    name: Verify release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip release metadata guard
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "Release metadata guard only runs for v* tags."

      - name: Checkout
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Verify release metadata matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run verify:release-metadata -- "${GITHUB_REF_NAME#v}"

  publish-docker-image:
    name: Publish Docker Image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ e2etests-docker-image, verify-release-metadata ]
    permissions:
      packages: write
    steps:
      - name: Set release env variable
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Sets up build environment
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Show buildx builder instance name
        run: echo "${{ steps.buildx.outputs.name }}"
      - name: Show buildx available platforms
        run: echo "${{ steps.buildx.outputs.platforms }}"

      # Login to GHCR
      - name: Log into GitHub Container Registry
        run: echo "$DOCKER_TOKEN" | docker login https://ghcr.io -u "$DOCKER_USER" --password-stdin
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
      # Set staging registry
      - name: Set staging registry env variable
        run: echo "staging_registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Push image to GHCR
      - name: Push to GHCR (tag vX.X.X)
        run: make docker-image-release \
          STAGING_REGISTRY="$STAGING_REGISTRY" \
          STAGING_VERSION="$STAGING_VERSION" \
          RELEASE_REGISTRY=ghcr.io/thejuran \
          RELEASE_VERSION="$RELEASE_VERSION"
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}
          STAGING_VERSION: ${{ github.run_number }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
      - name: Push to GHCR (tag latest)
        run: make docker-image-release \
          STAGING_REGISTRY="$STAGING_REGISTRY" \
          STAGING_VERSION="$STAGING_VERSION" \
          RELEASE_REGISTRY=ghcr.io/thejuran \
          RELEASE_VERSION=latest
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}
          STAGING_VERSION: ${{ github.run_number }}

  publish-github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ e2etests-docker-image, verify-release-metadata, publish-docker-image ]
    permissions:
      contents: write
    steps:
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create GitHub Release
        run: |
          sed "s|{{VERSION}}|${RELEASE_VERSION}|g" release-notes.md > release-body.md
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION} — SeedSyncarr" \
            --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ e2etests-docker-image, verify-release-metadata ]
    permissions:
      id-token: write
    steps:
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Stamp version from git tag
        run: sed -i "s|^version = \".*\"|version = \"${RELEASE_VERSION}\"|" pyproject.toml
        working-directory: src/python
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
      - name: Build package
        run: pip install build && python -m build
        working-directory: src/python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: src/python/dist/

  publish-docker-image-dev:
    name: Publish Docker Image (:dev)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ e2etests-docker-image ]
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Sets up build environment
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Show buildx builder instance name
        run: echo "${{ steps.buildx.outputs.name }}"
      - name: Show buildx available platforms
        run: echo "${{ steps.buildx.outputs.platforms }}"

      # Login to GHCR
      - name: Log into GitHub Container Registry
        run: echo "$DOCKER_TOKEN" | docker login https://ghcr.io -u "$DOCKER_USER" --password-stdin
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
      # Set staging registry
      - name: Set staging registry env variable
        run: echo "staging_registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Push image to GHCR
      - name: Push to GHCR (tag dev)
        run: make docker-image-release \
          STAGING_REGISTRY="$STAGING_REGISTRY" \
          STAGING_VERSION="$STAGING_VERSION" \
          RELEASE_REGISTRY=ghcr.io/thejuran \
          RELEASE_VERSION=dev
        env:
          STAGING_REGISTRY: ${{ env.staging_registry }}
          STAGING_VERSION: ${{ github.run_number }}

  publish-docs:
    name: Publish Documentation
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ e2etests-docker-image ]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Build documentation
        working-directory: src/python
        run: mkdocs build --site-dir ../../site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
